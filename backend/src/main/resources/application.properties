spring.application.name=backend

server.port=8080

spring.datasource.url=jdbc:mysql://127.0.0.1:3307/fresh_delivery_v2?useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true&useUnicode=true&characterEncoding=utf8
spring.datasource.username=root
spring.datasource.password=
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true
spring.jpa.open-in-view=false

app.jwt.secret=${JWT_SECRET:freshfood-v2-jwt-secret-key-must-be-at-least-32-bytes}
app.jwt.issuer=${JWT_ISSUER:freshfood-backend}
app.jwt.expires-in=${JWT_EXPIRES_IN:7200}
